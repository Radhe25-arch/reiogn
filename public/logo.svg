<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1120"/>
      <stop offset="100%" stop-color="#07080f"/>
    </radialGradient>
    <linearGradient id="lime-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4ff00"/>
      <stop offset="50%" stop-color="#b8ff00"/>
      <stop offset="100%" stop-color="#7ddd00"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0c8"/>
      <stop offset="100%" stop-color="#00c8a8"/>
    </linearGradient>
    <filter id="glow-lime" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outer-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hex-clip">
      <polygon points="200,28 340,112 340,288 200,372 60,288 60,112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <polygon points="200,28 340,112 340,288 200,372 60,288 60,112" fill="none" stroke="#b8ff00" stroke-width="1" opacity="0.08" filter="url(#outer-glow)"/>

  <!-- Hexagonal border - outer -->
  <polygon points="200,28 340,112 340,288 200,372 60,288 60,112" fill="none" stroke="rgba(184,255,0,0.15)" stroke-width="1.5"/>

  <!-- Hexagonal border - inner offset -->
  <polygon points="200,44 326,121 326,279 200,356 74,279 74,121" fill="none" stroke="rgba(184,255,0,0.06)" stroke-width="1"/>

  <!-- Corner tick marks on hex -->
  <line x1="200" y1="28" x2="200" y2="44" stroke="#b8ff00" stroke-width="2" opacity="0.7"/>
  <line x1="340" y1="112" x2="326" y2="121" stroke="#b8ff00" stroke-width="2" opacity="0.7"/>
  <line x1="340" y1="288" x2="326" y2="279" stroke="#b8ff00" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="372" x2="200" y2="356" stroke="#b8ff00" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="288" x2="74" y2="279" stroke="#b8ff00" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="112" x2="74" y2="121" stroke="#b8ff00" stroke-width="2" opacity="0.7"/>

  <!-- Background glow pool -->
  <ellipse cx="200" cy="200" rx="90" ry="80" fill="#b8ff00" opacity="0.03" filter="url(#outer-glow)"/>

  <!-- === CORE SIGIL: THE REIOGN MARK === -->
  <!-- Concept: A fractured crown / upward signal — 3 ascending peaks like a broadcast tower crown -->
  <!-- Built from angular strokes, grid-locked, machine-precise -->

  <!-- Left crown spike -->
  <polyline points="138,258 138,185 164,142 164,168" fill="none" stroke="url(#lime-grad)" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow-lime)"/>

  <!-- Middle crown spike — tallest, dominant -->
  <polyline points="156,258 156,198 200,128 244,198 244,258" fill="none" stroke="url(#lime-grad)" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow-lime)"/>

  <!-- Right crown spike -->
  <polyline points="236,168 236,142 262,185 262,258" fill="none" stroke="url(#lime-grad)" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow-lime)"/>

  <!-- Horizontal base bar — crown base -->
  <line x1="130" y1="258" x2="270" y2="258" stroke="url(#lime-grad)" stroke-width="7" stroke-linecap="square" filter="url(#glow-lime)"/>

  <!-- Inner highlight lines — signal echoes (thinner, teal) -->
  <polyline points="200,148" fill="none"/>

  <!-- Teal echo: center peak inner -->
  <polyline points="200,155 224,194 224,250" fill="none" stroke="#00f0c8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <polyline points="200,155 176,194 176,250" fill="none" stroke="#00f0c8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Apex dot — the crown jewel -->
  <circle cx="200" cy="128" r="5" fill="#b8ff00" filter="url(#glow-lime)"/>
  <circle cx="200" cy="128" r="2.5" fill="#ffffff"/>

  <!-- Left peak dot -->
  <circle cx="164" cy="142" r="3.5" fill="#b8ff00" opacity="0.7" filter="url(#glow-lime)"/>
  <!-- Right peak dot -->
  <circle cx="236" cy="142" r="3.5" fill="#b8ff00" opacity="0.7" filter="url(#glow-lime)"/>

  <!-- Signal pulse rings at apex -->
  <circle cx="200" cy="128" r="14" fill="none" stroke="#b8ff00" stroke-width="1" opacity="0.25"/>
  <circle cx="200" cy="128" r="24" fill="none" stroke="#b8ff00" stroke-width="0.8" opacity="0.12"/>

  <!-- Base feet — grounding marks -->
  <line x1="130" y1="258" x2="130" y2="272" stroke="#b8ff00" stroke-width="4" stroke-linecap="square" opacity="0.6"/>
  <line x1="270" y1="258" x2="270" y2="272" stroke="#b8ff00" stroke-width="4" stroke-linecap="square" opacity="0.6"/>
  <line x1="200" y1="258" x2="200" y2="272" stroke="#b8ff00" stroke-width="3" stroke-linecap="square" opacity="0.35"/>

  <!-- Micro grid dots — precision feel -->
  <circle cx="164" cy="258" r="1.5" fill="#b8ff00" opacity="0.4"/>
  <circle cx="236" cy="258" r="1.5" fill="#b8ff00" opacity="0.4"/>

  <!-- Bottom wordmark area -->
  <!-- Thin rule above text -->
  <line x1="148" y1="295" x2="252" y2="295" stroke="rgba(184,255,0,0.2)" stroke-width="0.8"/>

  <!-- REIOGN text — tight, mono, uppercase -->
  <text x="200" y="322" 
    font-family="'Arial Narrow', 'Impact', sans-serif" 
    font-size="28" 
    font-weight="900"
    letter-spacing="12"
    text-anchor="middle" 
    fill="#eef0ff"
    style="font-stretch: condensed;">REIOGN</text>

  <!-- Tagline -->
  <text x="200" y="340" 
    font-family="'Courier New', monospace" 
    font-size="7.5" 
    letter-spacing="3.5"
    text-anchor="middle" 
    fill="rgba(184,255,0,0.55)"
    text-transform="uppercase">ELITE AI INTELLIGENCE</text>

  <!-- Corner data marks — precision engineering feel -->
  <text x="72" y="88" font-family="'Courier New', monospace" font-size="7" fill="rgba(184,255,0,0.25)" letter-spacing="1">REV.01</text>
  <text x="290" y="88" font-family="'Courier New', monospace" font-size="7" fill="rgba(184,255,0,0.25)" letter-spacing="1" text-anchor="end">◈</text>

</svg>
